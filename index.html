<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raffi & Endah — Rumah Kita</title>

  <!-- ================================================
       GANTI: Ganti judul tab di atas jika perlu
       ================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================
       ROOT & RESET
       ============================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose:      #C0555A;
      --blush:     #F2CBCB;
      --cream:     #FDF6F0;
      --warm:      #E8D5C4;
      --bark:      #6B4226;
      --night:     #1A0A0A;
      --gold:      #C9A84C;
      --leaf:      #7A9E6E;
      --sky:       #B8D4E8;
      --ff-display: 'Playfair Display', serif;
      --ff-script:  'Dancing Script', cursive;
      --ff-body:    'Lato', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--night);
      font-family: var(--ff-body);
      overflow-x: hidden;
    }

    /* ============================
       MUSIC PLAYER (hidden auto)
       ============================ */
    #bg-audio {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 9999;
    }
    #music-btn {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: var(--rose);
      border: 3px solid var(--gold);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(192,85,90,.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform .3s;
      animation: pulse-btn 2s infinite;
    }
    #music-btn:hover { transform: scale(1.12); }
    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 4px 20px rgba(192,85,90,.5); }
      50%      { box-shadow: 0 4px 30px rgba(192,85,90,.9); }
    }

    /* ============================
       FLOATING PETALS
       ============================ */
    .petals-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -40px;
      width: 14px; height: 14px;
      background: var(--rose);
      border-radius: 60% 0 60% 0;
      opacity: .6;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: .7; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
    }

    /* ============================
       HERO SECTION
       ============================ */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      position: relative;
      background: linear-gradient(160deg, #1A0A0A 0%, #3D1A1A 45%, #6B4226 100%);
      overflow: hidden;
      padding: 60px 20px;
    }
    #hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 60%, rgba(192,85,90,.35) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 30%, rgba(201,168,76,.2) 0%, transparent 55%);
    }
    .hero-house-svg {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(600px, 90vw);
      opacity: .08;
      animation: float-house 6s ease-in-out infinite;
    }
    @keyframes float-house {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-18px); }
    }

    .hero-eyebrow {
      font-family: var(--ff-script);
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--gold);
      letter-spacing: .12em;
      animation: fade-down .9s .2s both;
    }
    .hero-title {
      font-family: var(--ff-display);
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      line-height: 1.05;
      color: #fff;
      position: relative; z-index: 2;
      animation: fade-up 1s .4s both;
    }
    .hero-title em { color: var(--rose); font-style: italic; }
    .hero-subtitle {
      margin-top: 18px;
      font-family: var(--ff-script);
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: var(--blush);
      animation: fade-up 1s .6s both;
    }
    .hero-names {
      margin-top: 30px;
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      animation: fade-up 1s .8s both;
    }
    .hero-name-card {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
      padding: 14px 28px;
      border-radius: 12px;
      color: #fff;
    }
    .hero-name-card .fullname {
      font-family: var(--ff-display);
      font-size: .95rem; letter-spacing: .08em;
      color: var(--gold);
    }
    .hero-name-card .shortname {
      font-family: var(--ff-script);
      font-size: 1.9rem;
      color: #fff;
    }
    .hero-heart {
      font-size: 2.8rem;
      animation: heartbeat 1.4s ease-in-out infinite;
      color: var(--rose);
      display: inline-block;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.3); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.2); }
    }
    .scroll-hint {
      position: absolute; bottom: 28px;
      left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.4);
      font-size: .8rem; letter-spacing: .15em;
      text-transform: uppercase;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(8px); }
    }

    /* ============================
       GENERIC SECTION SHELL
       ============================ */
    .section {
      padding: 100px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-tag {
      font-family: var(--ff-body);
      font-size: .75rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 12px;
      display: block;
    }
    .section-title {
      font-family: var(--ff-display);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700; line-height: 1.15;
      color: var(--bark);
      margin-bottom: 20px;
    }
    .section-title em { color: var(--rose); font-style: italic; }
    .section-body {
      font-size: 1.05rem; line-height: 1.8;
      color: #4a3728; max-width: 680px;
    }
    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      border-radius: 2px;
      margin: 18px 0 28px;
    }

    /* ============================
       REVEAL ANIMATION (scroll)
       ============================ */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity .8s ease, transform .8s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* ============================
       STORY TIMELINE
       ============================ */
    #story { background: var(--cream); }
    .timeline {
      position: relative;
      padding-left: 40px;
      margin-top: 40px;
    }
    .timeline::before {
      content: '';
      position: absolute; left: 14px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--rose), var(--gold), var(--leaf));
    }
    .tl-item {
      position: relative;
      margin-bottom: 48px;
    }
    .tl-dot {
      position: absolute; left: -32px; top: 6px;
      width: 18px; height: 18px;
      background: var(--rose);
      border: 3px solid var(--cream);
      border-radius: 50%;
      box-shadow: 0 0 0 3px var(--rose);
      transition: transform .3s;
    }
    .tl-item:hover .tl-dot { transform: scale(1.35); }
    .tl-year {
      font-family: var(--ff-script);
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .tl-heading {
      font-family: var(--ff-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--bark);
    }
    .tl-text {
      margin-top: 6px;
      font-size: .97rem; line-height: 1.75;
      color: #5a3d2b;
    }

    /* ============================
       PHOTO GALLERY
       ============================ */
    #gallery { background: #f7ede6; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 36px;
    }
    .gallery-card {
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(107,66,38,.18);
      transition: transform .4s, box-shadow .4s;
    }
    .gallery-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 18px 48px rgba(107,66,38,.28);
    }
    .gallery-card img {
      width: 100%; height: 240px;
      object-fit: cover;
      display: block;
      transition: transform .6s;
    }
    .gallery-card:hover img { transform: scale(1.08); }
    .gallery-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,10,10,.7) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .4s;
      display: flex; align-items: flex-end;
      padding: 16px;
    }
    .gallery-card:hover .overlay { opacity: 1; }
    .overlay-label {
      font-family: var(--ff-script);
      font-size: 1.2rem;
      color: #fff;
    }
    /* PLACEHOLDER CARDS (coloured boxes until real photos added) */
    .ph {
      width: 100%; height: 240px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }

    /* ============================
       VIDEO SECTION
       ============================ */
    #videos { background: var(--night); padding: 100px 20px; }
    #videos .section-title { color: #fff; }
    #videos .section-body { color: rgba(255,255,255,.65); }
    #videos .section-tag { color: var(--gold); }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
      margin-top: 36px;
    }
    .video-wrapper {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: #2a1010;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .4s;
    }
    .video-wrapper:hover { transform: translateY(-6px); }
    .video-wrapper video,
    .video-wrapper iframe {
      width: 100%; aspect-ratio: 16/9;
      display: block; border: none;
    }
    /* placeholder video card */
    .video-ph {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #2a1010, #4a2020);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: rgba(255,255,255,.3);
      font-size: 3rem;
      cursor: pointer;
      position: relative;
    }
    .video-ph span {
      font-family: var(--ff-body);
      font-size: .8rem; letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 8px;
      color: rgba(255,255,255,.2);
    }
    .video-label {
      padding: 12px 16px;
      color: rgba(255,255,255,.6);
      font-family: var(--ff-script);
      font-size: 1.1rem;
    }

    /* ============================
       RUMAH KITA (House Section)
       ============================ */
    #rumah {
      background: linear-gradient(135deg, #FDF6F0 60%, #E8D5C4 100%);
      padding: 100px 20px;
    }
    .house-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-top: 40px;
    }
    @media (max-width: 720px) {
      .house-layout { grid-template-columns: 1fr; }
    }
    .house-img-wrap {
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 16px 60px rgba(107,66,38,.25);
      position: relative;
    }
    .house-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      border: 3px solid rgba(255,255,255,.5);
      border-radius: 20px;
      pointer-events: none;
    }
    .house-img-wrap img {
      width: 100%; height: 360px;
      object-fit: cover;
      display: block;
      transition: transform .6s;
    }
    .house-img-wrap:hover img { transform: scale(1.05); }
    /* placeholder house */
    .house-ph {
      width: 100%; height: 360px;
      background: linear-gradient(135deg, #e8c9a0, #c9a070);
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem;
    }
    .house-text .quote {
      font-family: var(--ff-display);
      font-style: italic;
      font-size: 1.5rem;
      color: var(--bark);
      line-height: 1.6;
      border-left: 4px solid var(--rose);
      padding-left: 20px;
      margin-top: 24px;
    }
    .house-text .author {
      font-family: var(--ff-script);
      color: var(--rose);
      font-size: 1.2rem;
      margin-top: 12px;
      padding-left: 24px;
    }
    .house-features {
      display: flex; flex-direction: column; gap: 14px;
      margin-top: 28px;
    }
    .house-feature {
      display: flex; align-items: center; gap: 12px;
    }
    .feature-icon {
      font-size: 1.4rem;
      min-width: 36px; text-align: center;
    }
    .feature-text {
      font-size: .95rem; color: #5a3d2b; line-height: 1.5;
    }

    /* ============================
       VOWS / LETTER SECTION
       ============================ */
    #letter {
      background: linear-gradient(160deg, #3D1A1A, #1A0A0A);
      padding: 100px 20px;
      text-align: center;
    }
    #letter .section-title { color: #fff; }
    #letter .section-tag { color: var(--gold); }
    .letter-card {
      max-width: 700px;
      margin: 40px auto 0;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 50px 44px;
      position: relative;
    }
    .letter-card::before, .letter-card::after {
      content: '"';
      position: absolute;
      font-family: var(--ff-display);
      font-size: 9rem;
      color: rgba(192,85,90,.15);
      line-height: 1;
    }
    .letter-card::before { top: 10px; left: 20px; }
    .letter-card::after  { content: '"'; bottom: -30px; right: 20px; }
    .letter-text {
      font-family: var(--ff-display);
      font-style: italic;
      font-size: 1.15rem;
      line-height: 1.9;
      color: rgba(255,255,255,.85);
      position: relative; z-index: 1;
    }
    /* ================================================
       GANTI: Ubah isi surat/pesan cinta di bawah ini
       ================================================ */
    .letter-sig {
      margin-top: 28px;
      font-family: var(--ff-script);
      font-size: 1.6rem;
      color: var(--rose);
    }

    /* ============================
       CHILDREN SECTION
       ============================ */
    #children {
      background: linear-gradient(135deg, #EEF7EA 0%, #D9EDD3 100%);
      padding: 100px 20px;
    }
    .children-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 22px;
      margin-top: 40px;
    }
    .child-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
      transition: transform .4s, box-shadow .4s;
      padding-bottom: 20px;
    }
    .child-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
    }
    .child-card .child-img {
      width: 100%; height: 200px;
      object-fit: cover;
    }
    .child-ph {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #b8ddb0, #7aab70);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
    }
    .child-name {
      font-family: var(--ff-display);
      font-size: 1.1rem; font-weight: 700;
      color: var(--bark);
      margin: 14px 12px 4px;
    }
    .child-note {
      font-size: .85rem;
      color: #6a8a5a;
      padding: 0 12px;
    }

    /* ============================
       HINGGA AJAL (Forever)
       ============================ */
    #forever {
      background: radial-gradient(ellipse at center, #2a0a0a 0%, #0d0505 100%);
      padding: 120px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .stars-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 20% 50%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.5) 0%, transparent 100%);
    }
    .forever-heart {
      font-size: 5rem;
      animation: heartbeat 1.4s infinite;
      display: inline-block;
      color: var(--rose);
      filter: drop-shadow(0 0 30px rgba(192,85,90,.8));
    }
    .forever-title {
      font-family: var(--ff-script);
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
      margin: 20px 0 10px;
      line-height: 1.2;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(201,168,76,.4); }
      to   { text-shadow: 0 0 40px rgba(201,168,76,.9), 0 0 80px rgba(192,85,90,.5); }
    }
    .forever-sub {
      font-family: var(--ff-display);
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255,255,255,.55);
      max-width: 560px; margin: 0 auto;
    }
    .infinity-row {
      display: flex; gap: 20px; justify-content: center;
      flex-wrap: wrap; margin-top: 40px;
    }
    .inf-badge {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      padding: 14px 24px;
      border-radius: 40px;
      color: rgba(255,255,255,.7);
      font-size: .9rem; letter-spacing: .08em;
      backdrop-filter: blur(6px);
      transition: background .3s;
    }
    .inf-badge:hover { background: rgba(192,85,90,.2); color: #fff; }

    /* ============================
       FOOTER
       ============================ */
    footer {
      background: #0d0505;
      padding: 40px 20px;
      text-align: center;
      color: rgba(255,255,255,.3);
      font-size: .8rem;
    }
    footer .f-names {
      font-family: var(--ff-script);
      font-size: 1.6rem;
      color: var(--rose);
      margin-bottom: 8px;
    }

    /* ============================
       LIGHTBOX
       ============================ */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 10000;
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 10px;
      object-fit: contain;
      animation: lb-in .3s ease;
    }
    @keyframes lb-in { from { opacity:0; transform:scale(.9); } }
    #lightbox-close {
      position: absolute; top: 20px; right: 28px;
      font-size: 2.5rem; color: #fff; cursor: pointer;
      transition: color .2s;
    }
    #lightbox-close:hover { color: var(--rose); }

    /* ============================
       TYPED TEXT ANIMATION
       ============================ */
    .ty
