<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Rumah Cinta Raffi & Endah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Judul -->
  <h1 class="judul">Rumah Cinta Raffi Ramadhan & Nurendah Novianti</h1>

  <!-- Musik -->
  <audio id="musik" autoplay loop>
    <!-- GANTI src dengan file musik kamu -->
    <source src="musik/kita_usahakan_rumah_itu.mp3" type="audio/mpeg">
  </audio>

  <!-- Foto Rumah -->
  <div class="gambar">
    <!-- GANTI src dengan foto rumah kamu -->
    <img src="images/rumah.jpg" alt="Rumah Cinta">
  </div>

  <!-- Fotbar -->
  <div class="fotbar">
    <!-- GANTI src dengan foto bersama -->
    <img src="images/fotbar.jpg" alt="Foto Bersama">
  </div>

  <!-- Video -->
  <video controls>
    <!-- GANTI src dengan video kamu -->
    <source src="video/cinta.mp4" type="video/mp4">
  </video>

  <!-- Teks Animasi -->
  <p class="animasi">Cinta ini abadi hingga ajal memisahkan...</p>

  <!-- Navigasi ke halaman lain -->
  <nav>
    <a href="kenangan.html">Kenangan</a> |
    <a href="anak.html">Anak</a> |
    <a href="ajal.html">Hingga Ajal</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
